<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Gemini</title>
<style>
body { background:#1a1a2e; color:#fff; font-family:Arial; padding:20px; }
input { width:100%; padding:12px; background:#2a2a4e; border:1px solid #444; border-radius:8px; color:#fff; font-size:0.9rem; margin-bottom:10px; box-sizing:border-box; }
button { width:100%; padding:12px; background:#7c3aed; color:#fff; border:none; border-radius:8px; font-size:1rem; font-weight:bold; cursor:pointer; margin-bottom:20px; }
.result { padding:10px; border-radius:8px; margin-bottom:8px; font-size:0.85rem; }
.ok { background:rgba(34,197,94,0.2); border:1px solid #22c55e; color:#22c55e; }
.er { background:rgba(239,68,68,0.2); border:1px solid #ef4444; color:#ef4444; }
.wa { background:rgba(255,215,0,0.2); border:1px solid #ffd700; color:#ffd700; }
</style>
</head>
<body>
<h2 style="color:#ffd700">🔑 Test clé Gemini</h2>
<p style="color:#aaa;font-size:.85rem;margin-bottom:12px">Entre ta clé et clique Test pour voir quels modèles sont disponibles.</p>
<input type="password" id="key" placeholder="AIza...">
<button onclick="testAll()">🧪 Tester tous les modèles</button>
<div id="results"></div>

<script>
var MODELS = [
  'gemini-2.0-flash',
  'gemini-2.0-flash-lite',
  'gemini-2.0-flash-exp',
  'gemini-1.5-flash',
  'gemini-1.5-flash-latest',
  'gemini-1.5-flash-8b',
  'gemini-1.5-pro',
  'gemini-1.5-pro-latest',
  'gemini-1.0-pro',
  'gemini-pro'
];

async function testAll() {
  var key = document.getElementById('key').value.trim();
  if (!key) { alert('Entre ta clé !'); return; }
  var el = document.getElementById('results');
  el.innerHTML = '<div class="wa">⏳ Test en cours...</div>';

  var html = '';
  for (var i = 0; i < MODELS.length; i++) {
    var model = MODELS[i];
    try {
      var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + key, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: 'Say OK' }] }],
          generationConfig: { maxOutputTokens: 5 }
        })
      });
      var data = await res.json();
      if (data.error) {
        var code = data.error.code;
        var msg = data.error.message || '';
        if (code === 404 || msg.includes('not found')) {
          html += '<div class="er">❌ ' + model + ' — non disponible</div>';
        } else if (code === 429) {
          html += '<div class="wa">⚠️ ' + model + ' — quota dépassé (mais existe !)</div>';
        } else {
          html += '<div class="er">❌ ' + model + ' — ' + msg.slice(0,60) + '</div>';
        }
      } else {
        html += '<div class="ok">✅ ' + model + ' — DISPONIBLE !</div>';
      }
    } catch(e) {
      html += '<div class="er">❌ ' + model + ' — erreur réseau</div>';
    }
    el.innerHTML = html + '<div class="wa">⏳ Suite...</div>';
  }
  el.innerHTML = html + '<div class="wa" style="margin-top:12px">✅ Test terminé ! Copie les modèles disponibles et envoie-les à Claude.</div>';
}
</script>
</body>
</html>
